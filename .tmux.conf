# =========== Dependencies ===========

# Tmux Plugin Manager (tpm)
#   Install here: https://github.com/tmux-plugins/tpm


# =========== General Settings ===========

# Rebind leader to Control + s
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Bind r to reload ~/.tmux.conf
bind r source-file ~/.tmux.conf; display-message "Reloaded .tmux.conf"

# Remove delay on escape character
set -s escape-time 0

# =========== Panes Settings ===========

unbind '"'
unbind %
bind \\ split-window -h
bind - split-window -v

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set-option -g pane-active-border-style "bg=colour78"
set-option -ag pane-active-border-style "fg=colour78"

# =========== Status Bar ===========

set -g status-interval 2
set -g status-right-length 250
set -g @batt_remain_short true
set -g @online_icon "Online"
set -g @offline_icon "Offline"
set -g status-right '#{battery_status_bg} ♫ #{spotify_status} #{spotify_artist}: #{spotify_track} |  Battery: #{battery_percentage} #{battery_remain} | #{online_status} | %a %y-%m-%d | %H:%M '
set -g status-bg colour78

# =========== Plugins ===========

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'robhurring/tmux-spotify'

# =========== Plugin Settings ===========

# tmux continuum
set -g @continuum-restore 'on'

# =========== Run tmux plugin manager ===========

run -b '~/.tmux/plugins/tpm/tpm'

