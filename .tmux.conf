# =========== DEPENDENCIES ===========

# This .tmux.conf is dependent on
# Tmux Plugin Manager (tpm)
# Install here:
# https://github.com/tmux-plugins/tpm

# =========== Re-bind leader ===========

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# =========== Panes Settings ===========

unbind '"'
unbind %
bind \\ split-window -h
bind - split-window -v
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D
set-option -g pane-active-border-style "bg=colour154"
set-option -ag pane-active-border-style "fg=colour154"

# =========== Reload config file ===========

bind r source-file ~/.tmux.conf

# =========== Status Bar ===========

set -g status-interval 2
set -g status-right-length 100
set -g @batt_remain_short true
set -g @online_icon "Online"
set -g @offline_icon "Offline"
set -g status-right '#{battery_status_bg} Battery: #{battery_percentage} #{battery_remain} | #{online_status} | %a %y-%m-%d | %H:%M '

# =========== Remove delay on escape character ===========

set -s escape-time 0

# =========== Plugins ===========

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
run -b '~/.tmux/plugins/tpm/tpm'

