# =========== DEPENDENCIES ===========

# This .tmux.conf is dependent on
# Tmux Plugin Manager (tpm)
# Install here:
# https://github.com/tmux-plugins/tpm

# =========== Re-bind leader ===========

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# =========== Panes Settings ===========

unbind '"'
unbind %
bind \\ split-window -h
bind - split-window -v

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set-option -g pane-active-border-style "bg=colour78"
set-option -ag pane-active-border-style "fg=colour78"

# =========== Reload config file ===========

bind r source-file ~/.tmux.conf

# =========== Status Bar ===========

set -g status-interval 2
set -g status-right-length 100
set -g @batt_remain_short true
set -g @online_icon "Online"
set -g @offline_icon "Offline"
set -g status-right '#{battery_status_bg} Battery: #{battery_percentage} #{battery_remain} | #{online_status} | %a %y-%m-%d | %H:%M '
set -g status-bg colour78

# =========== Remove delay on escape character ===========

set -s escape-time 0

# =========== Plugins ===========

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# =========== Plugin Settings ===========

# tmux continuum

set -g @continuum-restore 'on'

# =========== Run tmux plugin manager ===========

run -b '~/.tmux/plugins/tpm/tpm'

